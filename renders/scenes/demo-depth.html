<!doctype html>
<html><head><style>
body{margin:0;background:#0a0a0d;overflow:hidden}
canvas{display:block}
</style></head>
<body>
<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

// ──────────── renderer ────────────
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(2, window.devicePixelRatio));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

// ──────────── scene + env ────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0d);
scene.fog = new THREE.Fog(0x0a0a0d, 18, 45);

const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

// ──────────── camera ────────────
const camera = new THREE.PerspectiveCamera(34, innerWidth/innerHeight, 0.1, 100);
camera.position.set(6.5, 4.5, 8.5);
camera.lookAt(0, 0.3, 0);

// ──────────── lighting (key + fill + rim) ────────────
const key = new THREE.DirectionalLight(0xfff5e1, 3.2);
key.position.set(6, 10, 5);
key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
key.shadow.camera.near = 0.5; key.shadow.camera.far = 40;
key.shadow.camera.left = -12; key.shadow.camera.right = 12;
key.shadow.camera.top = 12; key.shadow.camera.bottom = -12;
key.shadow.bias = -0.0005;
key.shadow.radius = 4;
scene.add(key);

const fill = new THREE.DirectionalLight(0x8ab4ff, 0.7);
fill.position.set(-5, 3, -2);
scene.add(fill);

const rim = new THREE.DirectionalLight(0xff9f43, 1.4);
rim.position.set(0, 4, -6);
scene.add(rim);

scene.add(new THREE.AmbientLight(0xffffff, 0.2));

// ──────────── ground plane ────────────
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(60, 60),
  new THREE.MeshStandardMaterial({ color: 0x12121a, roughness: 0.85, metalness: 0.05 })
);
ground.rotation.x = -Math.PI/2;
ground.position.y = -1.2;
ground.receiveShadow = true;
scene.add(ground);

// subtle grid on ground
const grid = new THREE.GridHelper(40, 40, 0x252530, 0x1a1a24);
grid.position.y = -1.195;
grid.material.opacity = 0.5;
grid.material.transparent = true;
scene.add(grid);

// ──────────── geometry: hero composition ────────────
const group = new THREE.Group();
scene.add(group);

// main glass/iridescent torus knot
const heroMat = new THREE.MeshPhysicalMaterial({
  color: 0xf5f5f7,
  metalness: 0.3,
  roughness: 0.08,
  clearcoat: 1.0,
  clearcoatRoughness: 0.05,
  iridescence: 0.9,
  iridescenceIOR: 1.45,
  iridescenceThicknessRange: [100, 600],
  sheen: 0.4,
  sheenColor: 0xd9b07a,
  envMapIntensity: 1.2,
});
const hero = new THREE.Mesh(new THREE.TorusKnotGeometry(1.1, 0.36, 220, 32, 2, 3), heroMat);
hero.position.set(0, 0.8, 0);
hero.castShadow = true;
hero.receiveShadow = true;
group.add(hero);

// cream rounded cube (left foreground)
const cubeGeom = new THREE.BoxGeometry(1.6, 1.6, 1.6, 1, 1, 1);
const cubeMat = new THREE.MeshPhysicalMaterial({
  color: 0xfff8f1, metalness: 0.1, roughness: 0.35, clearcoat: 0.5,
});
const cube = new THREE.Mesh(cubeGeom, cubeMat);
cube.position.set(-2.8, -0.4, 1.6);
cube.rotation.set(0.3, 0.5, 0);
cube.castShadow = true; cube.receiveShadow = true;
group.add(cube);

// blue chrome sphere (right mid)
const sphereMat = new THREE.MeshPhysicalMaterial({
  color: 0x7EC8E3, metalness: 0.95, roughness: 0.1,
  clearcoat: 1, clearcoatRoughness: 0,
});
const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.85, 64, 64), sphereMat);
sphere.position.set(2.6, -0.35, 0.8);
sphere.castShadow = true; sphere.receiveShadow = true;
group.add(sphere);

// small orange torus (back)
const torus = new THREE.Mesh(
  new THREE.TorusGeometry(0.55, 0.2, 32, 64),
  new THREE.MeshPhysicalMaterial({ color: 0xff9f43, metalness: 0.3, roughness: 0.3, clearcoat: 0.6 })
);
torus.position.set(-1.2, 1.2, -1.8);
torus.rotation.set(0.8, 0.5, 0);
torus.castShadow = true; torus.receiveShadow = true;
group.add(torus);

// small green cylinder (back right, depth)
const cyl = new THREE.Mesh(
  new THREE.CylinderGeometry(0.35, 0.35, 0.8, 32),
  new THREE.MeshStandardMaterial({ color: 0x6BC67E, metalness: 0.2, roughness: 0.45 })
);
cyl.position.set(1.6, 0.4, -2.2);
cyl.castShadow = true; cyl.receiveShadow = true;
group.add(cyl);

// tiny cream dodecahedron floating high
const dodec = new THREE.Mesh(
  new THREE.DodecahedronGeometry(0.4),
  new THREE.MeshPhysicalMaterial({ color: 0xfaeedc, metalness: 0.7, roughness: 0.15, clearcoat: 0.8 })
);
dodec.position.set(-3.4, 1.6, -0.6);
dodec.rotation.set(0.5, 0.3, 0.8);
dodec.castShadow = true; dodec.receiveShadow = true;
group.add(dodec);

// small gold accent (extra depth marker)
const gold = new THREE.Mesh(
  new THREE.OctahedronGeometry(0.45),
  new THREE.MeshPhysicalMaterial({ color: 0xd9b07a, metalness: 0.95, roughness: 0.15 })
);
gold.position.set(3.5, 0.2, 2.2);
gold.rotation.set(0.4, 0.6, 0.2);
gold.castShadow = true; gold.receiveShadow = true;
group.add(gold);

// gentle rotation for the hero
let t = 0;
function animate(){
  requestAnimationFrame(animate);
  t += 0.005;
  hero.rotation.y = t * 0.8;
  hero.rotation.x = Math.sin(t * 0.5) * 0.2;
  renderer.render(scene, camera);
  // tell puppeteer the scene is ready after a few frames have rendered
  if (!window.sceneReady) {
    if (t > 0.25) window.sceneReady = true;
  }
}
animate();
</script></body></html>
